services:
  - type: web
    name: kanad-ai-gateway
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install; npm run ai:gateway:build
    startCommand: npm run ai:gateway:start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: AI_GATEWAY_ALLOWED_ORIGINS
        value: https://kanaddev.myshopify.com
      - key: SHOPIFY_ADMIN_API_VERSION
        value: 2025-01
      - key: SHOPIFY_THEME_SETTINGS_CACHE_MS
        value: 60000
      - key: SHOPIFY_THEME_ID
        sync: false
      - key: SHOPIFY_ADMIN_ACCESS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CUSTOM_AI_ENDPOINT
        sync: false
      - key: CUSTOM_AI_BEARER_TOKEN
        sync: false