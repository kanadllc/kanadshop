<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="h5bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a40"/>
    </linearGradient>
    <linearGradient id="h5screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="h5glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#60a5fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="h5orb1" cx="65%" cy="28%" r="36%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="h5orb2" cx="22%" cy="72%" r="28%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#h5bg)"/>
  <rect width="800" height="600" fill="url(#h5orb1)"/>
  <rect width="800" height="600" fill="url(#h5orb2)"/>

  <!-- Grid -->
  <g opacity="0.07" stroke="#60a5fa" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- Smartphone body -->
  <rect x="308" y="75" width="184" height="375" rx="26" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Screen bezel -->
  <rect x="320" y="100" width="160" height="320" rx="10" fill="url(#h5screen)" opacity="0.95"/>
  <!-- Notch -->
  <rect x="370" y="100" width="60" height="12" rx="6" fill="#0f172a"/>
  <!-- Camera dot -->
  <circle cx="418" cy="106" r="4" fill="#0f172a"/>

  <!-- App grid on screen -->
  <g opacity="0.85">
    <rect x="334" y="128" width="38" height="38" rx="8" fill="#f59e0b" opacity="0.6"/>
    <rect x="382" y="128" width="38" height="38" rx="8" fill="#10b981" opacity="0.6"/>
    <rect x="430" y="128" width="38" height="38" rx="8" fill="#ec4899" opacity="0.6"/>
    <rect x="334" y="178" width="38" height="38" rx="8" fill="#8b5cf6" opacity="0.6"/>
    <rect x="382" y="178" width="38" height="38" rx="8" fill="#ffffff" opacity="0.15"/>
    <rect x="430" y="178" width="38" height="38" rx="8" fill="#ef4444" opacity="0.6"/>
  </g>
  <!-- Screen content lines -->
  <rect x="334" y="232" width="134" height="7" rx="3.5" fill="#ffffff" opacity="0.2"/>
  <rect x="334" y="252" width="100" height="5" rx="2.5" fill="#ffffff" opacity="0.13"/>
  <rect x="334" y="268" width="118" height="5" rx="2.5" fill="#ffffff" opacity="0.13"/>
  <rect x="334" y="290" width="134" height="40" rx="8" fill="#ffffff" opacity="0.07"/>
  <!-- Home bar -->
  <rect x="370" y="404" width="60" height="5" rx="2.5" fill="#64748b"/>
  <!-- Power button -->
  <rect x="492" y="180" width="4" height="40" rx="2" fill="#475569"/>
  <!-- Volume buttons -->
  <rect x="304" y="170" width="4" height="28" rx="2" fill="#475569"/>
  <rect x="304" y="208" width="4" height="28" rx="2" fill="#475569"/>

  <!-- Smart watch -->
  <rect x="176" y="195" width="96" height="110" rx="22" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="190" y="212" width="68" height="76" rx="10" fill="#2563eb" opacity="0.85"/>
  <!-- Watch band top/bottom -->
  <rect x="196" y="172" width="56" height="26" rx="10" fill="#0f172a"/>
  <rect x="196" y="302" width="56" height="26" rx="10" fill="#0f172a"/>
  <!-- Watch face clock hands -->
  <circle cx="224" cy="250" r="22" fill="none" stroke="#93c5fd" stroke-width="2" opacity="0.7"/>
  <line x1="224" y1="236" x2="224" y2="250" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="224" y1="250" x2="234" y2="256" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"/>
  <circle cx="224" cy="250" r="3" fill="#60a5fa"/>

  <!-- Wireless earbuds case -->
  <ellipse cx="575" cy="290" rx="58" ry="42" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Hinge line -->
  <ellipse cx="575" cy="268" rx="54" ry="8" fill="#0f172a" opacity="0.6"/>
  <!-- Earbuds -->
  <circle cx="554" cy="290" r="16" fill="#2563eb" opacity="0.75"/>
  <circle cx="596" cy="290" r="16" fill="#2563eb" opacity="0.75"/>
  <circle cx="554" cy="290" r="7" fill="#1e40af"/>
  <circle cx="596" cy="290" r="7" fill="#1e40af"/>
  <!-- LED -->
  <circle cx="575" cy="256" r="5" fill="#10b981" opacity="0.95"/>

  <!-- Floating circuit lines -->
  <g opacity="0.4" stroke="#60a5fa" stroke-width="1.5" fill="none">
    <circle cx="140" cy="160" r="7" stroke-opacity="0.7"/>
    <circle cx="170" cy="140" r="5" stroke-opacity="0.5"/>
    <line x1="140" y1="160" x2="170" y2="140"/>
    <circle cx="660" cy="420" r="7" stroke-opacity="0.7"/>
    <circle cx="690" cy="400" r="5" stroke-opacity="0.5"/>
    <line x1="660" y1="420" x2="690" y2="400"/>
    <circle cx="650" cy="160" r="5" stroke-opacity="0.5"/>
    <circle cx="680" cy="180" r="7" stroke-opacity="0.7"/>
    <line x1="650" y1="160" x2="680" y2="180"/>
  </g>

  <!-- Label card -->
  <rect x="72" y="460" width="210" height="68" rx="14" fill="#1e293b" stroke="#1d4ed8" stroke-width="1.5" opacity="0.92"/>
  <text x="177" y="487" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#93c5fd" letter-spacing="3.5" font-weight="700">ELECTRONICS</text>
  <text x="177" y="514" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#f8fafc" font-weight="400" letter-spacing="-0.5">Smart Living</text>
</svg>
