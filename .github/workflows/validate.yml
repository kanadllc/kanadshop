name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - docs/**

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Frontend build
        run: npm run build

      - name: Shopify Theme Check
        run: npx shopify theme check --path shopify-theme