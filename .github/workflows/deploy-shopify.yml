name: Deploy Shopify Theme

on:
  push:
    branches:
      - main
    paths:
      - shopify-theme/**
      - package.json
      - package-lock.json
      - .github/workflows/deploy-shopify.yml
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - live

permissions:
  contents: read

jobs:
  deploy-main:
    if: github.event_name == 'push' || github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Shopify deploy secrets
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
        run: |
          test -n "$SHOPIFY_STORE" || (echo "Missing SHOPIFY_STORE secret" && exit 1)
          test -n "$SHOPIFY_CLI_THEME_TOKEN" || (echo "Missing SHOPIFY_CLI_THEME_TOKEN secret" && exit 1)

      - name: Print deploy diagnostics
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_MAIN_THEME_ID: 149599879319
        run: |
          set -euo pipefail
          echo "Node $(node --version)"
          echo "npm $(npm --version)"
          echo "Shopify CLI $(npx shopify version)"
          echo "Deploy store: $SHOPIFY_STORE"
          echo "Target theme: $SHOPIFY_MAIN_THEME_ID"

      - name: Validate theme before deploy
        run: npx shopify theme check --path shopify-theme

      - name: Verify store access and theme visibility
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_MAIN_THEME_ID: 149599879319
        run: |
          set -euo pipefail
          npx shopify theme list --store "$SHOPIFY_STORE" --no-color
          echo "Confirmed access to store and attempted lookup for theme $SHOPIFY_MAIN_THEME_ID"

      - name: Deploy to Shopify main theme
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_MAIN_THEME_ID: 149599879319
        run: |
          set -euo pipefail
          npx shopify theme push \
            --allow-live \
            --verbose \
            --no-color \
            --store "$SHOPIFY_STORE" \
            --path shopify-theme \
            --ignore "config/settings_data.json" \
            --theme "$SHOPIFY_MAIN_THEME_ID"

  deploy-live:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'live'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Shopify live secrets
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_LIVE_THEME_ID: ${{ secrets.SHOPIFY_LIVE_THEME_ID }}
        run: |
          test -n "$SHOPIFY_STORE" || (echo "Missing SHOPIFY_STORE secret" && exit 1)
          test -n "$SHOPIFY_CLI_THEME_TOKEN" || (echo "Missing SHOPIFY_CLI_THEME_TOKEN secret" && exit 1)
          test -n "$SHOPIFY_LIVE_THEME_ID" || (echo "Missing SHOPIFY_LIVE_THEME_ID secret" && exit 1)

      - name: Print live deploy diagnostics
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_LIVE_THEME_ID: ${{ secrets.SHOPIFY_LIVE_THEME_ID }}
        run: |
          set -euo pipefail
          echo "Node $(node --version)"
          echo "npm $(npm --version)"
          echo "Shopify CLI $(npx shopify version)"
          echo "Deploy store: $SHOPIFY_STORE"
          echo "Target theme: $SHOPIFY_LIVE_THEME_ID"

      - name: Validate theme before live deploy
        run: npx shopify theme check --path shopify-theme

      - name: Verify live store access and theme visibility
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_LIVE_THEME_ID: ${{ secrets.SHOPIFY_LIVE_THEME_ID }}
        run: |
          set -euo pipefail
          npx shopify theme list --store "$SHOPIFY_STORE" --no-color
          echo "Confirmed access to store and attempted lookup for theme $SHOPIFY_LIVE_THEME_ID"

      - name: Deploy to Shopify live theme
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_LIVE_THEME_ID: ${{ secrets.SHOPIFY_LIVE_THEME_ID }}
        run: |
          set -euo pipefail
          npx shopify theme push \
            --allow-live \
            --verbose \
            --no-color \
            --store "$SHOPIFY_STORE" \
            --path shopify-theme \
            --ignore "config/settings_data.json" \
            --theme "$SHOPIFY_LIVE_THEME_ID"